# Render blueprint — deploys the GrowEasy CSV Importer backend as a native Node service.
# Connect this repo at https://dashboard.render.com/blueprints and Render reads this file.
# Secrets (sync: false) are entered once in the Render dashboard — never commit them.
#
# We build natively (not via Docker): the backend is plain Node ESM, so rootDir +
# npm ci + node start is simpler and more reliable than Docker path resolution.
services:
  - type: web
    name: groweasy-csv-saurabh
    runtime: node
    plan: free
    # Backend lives in a subdirectory — build and run from there.
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    # /api/v1/health returns 200 with no external deps — safe health probe.
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # package.json requires Node >=20; pin it so Render doesn't drift.
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; env.js reads process.env.PORT.
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      # Set in the dashboard (Environment tab) — do not commit the key.
      - key: GEMINI_API_KEY
        sync: false
      # The Cloudflare Worker URL that serves the frontend (CORS allow-list).
      # Comma-separate to add more origins (e.g. a preview URL).
      - key: FRONTEND_ORIGIN
        value: https://csvreader.saurabhsinghxyz0.workers.dev
      # Optional MongoDB Atlas connection string. Leave unset to run stateless
      # (history disabled). Set in the dashboard if you want persistence.
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: groweasy_csv_importer
